#:schema node_modules/wrangler/config-schema.json
name = "bizcommerz-agentic-engine"
main = "src/worker.ts"
compatibility_date = "2025-03-20"
compatibility_flags = ["nodejs_compat"]

[site]
bucket = "./public"

[observability]
enabled = true

[vars]
ENGINE_NAME = "BizCommerzAgenticEngine"
LOG_LEVEL = "info"
ENABLE_LEARNING = "true"

[[durable_objects.bindings]]
name = "ENGINE_STATE"
class_name = "EngineStateV2"

[[migrations]]
tag = "v1"
new_classes = ["EngineState"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["EngineStateV2"]

# Cloudflare Mesh
MESH_AGENT_URL = "https://agent.ametech9.com"
MESH_API_URL = "https://api.ametech9.com"
MESH_TUNNEL_ID = "630830bb-cfbd-470a-b2ee-38f62a4add78"
